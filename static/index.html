<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chroma</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .icon { width: 20px; height: 20px; fill: currentColor; }
    .count-badge { font-size: 0.8rem; color: #666; margin-left: 8px; font-weight: normal; }
  </style>
</head>
<body>

<div class="app-grid">

  <nav class="sidebar">
    <div class="brand">
      <div class="status-dot" id="status-indicator"></div>
      <span style="letter-spacing: 1px;">CHROMA</span>
    </div>
    <a href="#" class="nav-link" id="theme-toggle" style="margin-top: auto;">
       <span style="font-size: 1.2rem; margin-right: 8px;">🌓</span> Light/Dark
    </a>
   <div style="padding: 0 12px 16px 12px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 16px;">
        <div style="font-size: 0.75rem; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Active Playlist</div>
        <select id="playlist-select" style="width: 100%; background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); padding: 6px; border-radius: 4px; display:none;">
            <option value="" disabled selected>Select Playlist...</option>
        </select>
        <div id="sidebar-playlist-actions" style="display: none; gap: 5px; margin-top: 8px; flex-wrap: wrap;">
            <button class="btn-small" id="btn-sidebar-play" style="flex: 1 1 40%;">Load</button>
            <button class="btn-small" id="btn-sidebar-shuffle" style="flex: 1 1 40%;">Shuffle</button>
            <button class="btn-small" id="btn-sidebar-least-played" style="flex: 1 1 100%;">Least Played</button>
        </div>
    </div>

    <a href="#" class="nav-link active" id="nav-queue">Queue</a>
    <a href="#" class="nav-link" id="nav-history">History</a>
    
    <a href="#" class="nav-link" id="nav-library">Library</a>
    <a href="#" class="nav-link" id="nav-playlists">Playlists</a>
    <a href="#" class="nav-link" id="nav-banned">Banned</a>
    <div style="flex:1"></div>
    <div style="padding: 12px; font-size: 0.75rem; color: #444; font-family: monospace;">
      VER: 1.4
    </div>
  </nav>

  <main class="main-view">

    <div id="queue-view">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Up Next</h2>
        <div style="display: flex; gap: 8px;">
            <button class="btn-small danger" id="btn-clear-queue">Clear Queue</button>
            <button class="btn-small" id="btn-save-queue">Save Queue</button>
        </div>
      </div>
      <div id="queue-container" class="list-group" style="margin-bottom: 40px;"></div>
    </div>

    <div id="history-view" class="hidden">
      <h2>History</h2>
      <div id="history-container" class="list-group"></div>
    </div>

    <div id="library-view" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Library <span id="library-count" class="count-badge"></span></h2>
        <div>
            <select id="playlist-select-hidden" style="background: #333; color: #fff; border: 1px solid #444; padding: 4px; border-radius: 4px; display:none; margin-right: 10px;">
            </select>
            <button class="btn-small" id="btn-rescan">Rescan</button>
        </div>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search artist or title...">
        
        <select id="sort-select" style="background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px; padding: 0 10px;">
            <option value="artist-asc">Artist (A-Z)</option>
            <option value="title-asc">Title (A-Z)</option>
            <option value="plays-desc">Most Played</option>
            <option value="plays-asc">Least Played</option>
        </select>

        <button id="search-btn" class="btn-small">Go</button>
      </div>
      <div id="library-container" class="list-group"></div>
    </div>

    <div id="playlists-view" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">Saved Playlists</h2>
        <select id="playlist-sort-select" style="background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px;">
            <option value="default">Default (Custom Order)</option>
            <option value="artist-asc">Artist (A-Z)</option>
            <option value="title-asc">Title (A-Z)</option>
            <option value="plays-desc">Most Played</option>
            <option value="plays-asc">Least Played</option>
        </select>
      </div>
      <div id="playlists-container" class="list-group"></div>
    </div>

    <div id="banned-list-view" class="hidden">
      <h2>Banned Videos</h2>
      <div id="banned-container" class="list-group"></div>
    </div>

    <div id="message" style="position: fixed; bottom: 100px; right: 20px; background: #333; padding: 10px 20px; border-radius: 4px; display:none;"></div>
  </main>

  <footer class="player-bar">

    <div class="now-playing-info">
      <div id="now-playing-title" class="track-title">Not Playing</div>
      <div id="now-playing-artist" class="track-artist">—</div>
    </div>

    <div class="player-center">
      <div class="controls-row">
        <button id="btn-stop" class="control-btn" title="Stop">■</button>
        <button id="btn-pause" class="control-btn primary" title="Play/Pause">▶</button>
        <button id="btn-next" class="control-btn" title="Next (Space)">⏭</button>
        <button id="btn-ban" class="control-btn" title="Ban Song" style="color: #d32f2f;">🚫</button>
      </div>
      <div class="progress-container">
        <span id="time-current">0:00</span>
        <input type="range" id="seek-slider" min="0" value="0" step="1">
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <button id="btn-stats" class="btn-small" style="margin-right: 10px; font-size: 0.7rem; opacity: 0.7;">STATS</button>

      <span style="font-size: 0.8rem; color:#888;">Vol</span>
      <div class="volume-wrap">
        <input type="range" min="0" max="100" value="70" id="volume-slider">
      </div>
    </div>
  </footer>

</div>
  <script src="/static/js/ui.js?v=1.0"></script>
  <script src="/static/js/api.js?v=1.0"></script>
  <script src="/static/js/player.js?v=1.0"></script>
  <script src="/static/js/library.js?v=1.0"></script>
  <script src="/static/js/playlists.js?v=1.0"></script>
  <script src="/static/js/app.js?v=1.0"></script>
</body>
</html>
